name: Build book

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Pandoc and TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            texlive-xetex \
            texlive-latex-extra \
            texlive-lang-german \
            texlive-fonts-recommended \
            lmodern

      - name: Build PDF
        run: make

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: buch-pdf
          path: buch.pdf
